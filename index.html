<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAP — Musique À Part</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
  <!-- D3 et TopoJSON chargés en scripts classiques = plus fiable -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/topojson/3.0.2/topojson.min.js"></script>
</head>
<body>

  <div id="login-screen">
    <div class="login-box">
      <div class="login-mark">
        <svg width="36" height="36" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="16.5" stroke="currentColor" stroke-width="1.2"/>
          <line x1="1.5" y1="18" x2="34.5" y2="18" stroke="currentColor" stroke-width="0.8" opacity="0.4"/>
          <path d="M18 1.5 Q23 9 23 18 Q23 27 18 34.5" stroke="currentColor" stroke-width="0.8" opacity="0.4" fill="none"/>
          <path d="M18 1.5 Q13 9 13 18 Q13 27 18 34.5" stroke="currentColor" stroke-width="0.8" opacity="0.4" fill="none"/>
        </svg>
      </div>
      <h1>MAP</h1>
      <p class="login-sub">Musique À Part</p>
      <input type="password" id="pwd-input" placeholder="Mot de passe" autocomplete="current-password" />
      <button id="login-btn">Entrer</button>
      <p class="login-error" id="login-error">Mot de passe incorrect</p>
    </div>
  </div>

  <div id="app" class="hidden">
    <header>
      <div class="header-left">
        <svg width="16" height="16" viewBox="0 0 36 36" fill="none">
          <circle cx="18" cy="18" r="16.5" stroke="currentColor" stroke-width="1.4"/>
          <line x1="1.5" y1="18" x2="34.5" y2="18" stroke="currentColor" stroke-width="0.8" opacity="0.5"/>
          <path d="M18 1.5 Q23 9 23 18 Q23 27 18 34.5" stroke="currentColor" stroke-width="0.8" opacity="0.5" fill="none"/>
          <path d="M18 1.5 Q13 9 13 18 Q13 27 18 34.5" stroke="currentColor" stroke-width="0.8" opacity="0.5" fill="none"/>
        </svg>
        <span class="header-title">MAP <span class="header-sub">— Musique À Part</span></span>
      </div>
      <div class="header-right">
        <div class="stat-pill"><span class="dot dot-todo"></span><span id="cnt-todo">0</span></div>
        <div class="stat-pill"><span class="dot dot-wip"></span><span id="cnt-wip">0</span></div>
        <div class="stat-pill"><span class="dot dot-script"></span><span id="cnt-script">0</span></div>
        <div class="stat-pill"><span class="dot dot-done"></span><span id="cnt-done">0</span></div>
        <button class="theme-btn" id="theme-btn" title="Mode nuit/jour">
          <svg id="icon-sun" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg id="icon-moon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <button class="logout-btn" id="logout-btn">Déconnexion</button>
      </div>
    </header>

    <main>
      <div id="map-wrapper">
        <svg id="map-svg"><g id="countries-group"></g></svg>
        <div id="map-loading"><div class="spinner"></div><span>Chargement</span></div>
        <div id="zoom-controls">
          <button id="zoom-in">+</button>
          <button id="zoom-out">−</button>
          <button id="zoom-reset">↺</button>
        </div>
        <div id="tooltip"><div id="tt-name"></div><div id="tt-status"></div><div id="tt-note"></div></div>
      </div>
      <div id="legend">
        <span class="leg"><span class="dot dot-todo"></span>À explorer</span>
        <span class="leg"><span class="dot dot-wip"></span>Piste en cours</span>
        <span class="leg"><span class="dot dot-script"></span>Script fini</span>
        <span class="leg"><span class="dot dot-done"></span>En ligne</span>
        <span class="leg-sep"></span>
        <span class="leg-hint">Scroll · Glisser · Cliquer</span>
      </div>
    </main>

    <div id="overlay" class="hidden"></div>
    <div id="panel" class="hidden">
      <div class="panel-head">
        <div class="panel-head-left">
          <div id="panel-status-dot" class="panel-status-dot"></div>
          <div>
            <div id="panel-name" class="panel-name"></div>
            <div id="panel-status-label" class="panel-status-lbl"></div>
          </div>
        </div>
        <button id="panel-close" class="btn-close">×</button>
      </div>
      <div class="panel-body">
        <div class="field-group">
          <label class="lbl">Statut</label>
          <div class="status-row">
            <button class="sbtn s-todo" data-s="todo">À explorer</button>
            <button class="sbtn s-wip" data-s="wip">Piste en cours</button>
            <button class="sbtn s-script" data-s="script">Script fini</button>
            <button class="sbtn s-done" data-s="done">En ligne</button>
          </div>
        </div>
        <div class="field-group">
          <label class="lbl">Catégorie</label>
          <input id="panel-category" class="finput" placeholder="Drôle, insolite, émouvant, historique…" />
        </div>
        <div class="field-group">
          <label class="lbl">Artiste / Angle</label>
          <input id="panel-artist" class="finput" placeholder="Nom de l'artiste, groupe…" />
        </div>
        <div class="field-group">
          <label class="lbl">Notes</label>
          <textarea id="panel-note" class="ftextarea" placeholder="Sources, idées narratives, contacts…"></textarea>
        </div>
        <div class="field-group">
          <label class="lbl">Liens</label>
          <div id="links-list"></div>
          <div class="link-add-row">
            <input id="link-input" class="finput" placeholder="https://…" type="url" />
            <button id="add-link-btn" class="btn-add">+</button>
          </div>
        </div>
      </div>
      <div class="panel-foot">
        <span id="last-edit" class="last-edit"></span>
        <button id="panel-save" class="btn-save">Enregistrer</button>
      </div>
    </div>

    <div id="list-bar">
      <button id="list-toggle-btn">≡ Pays annotés</button>
    </div>
    <div id="list-drawer" class="hidden">
      <div class="drawer-head"><span>Pays annotés</span><button id="drawer-close">×</button></div>
      <div id="drawer-body"></div>
    </div>
  </div>

  <!-- Firebase en module, app.js en module -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
