<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Le QR Code de Seb</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- Background layers -->
  <canvas id="rain-canvas"></canvas>
  <div class="ambient ambient-1"></div>
  <div class="ambient ambient-2"></div>
  <div class="ambient ambient-3"></div>
  <div class="grid-overlay"></div>
  <div class="vignette"></div>
  <div class="scanline"></div>

  <!-- SCREEN: Welcome -->
  <div id="screen-welcome" class="screen active">
    <div class="card">
      <div class="logo-ring">💪</div>
      <h1 class="title">Le QR Code<br>de <span class="accent">Seb</span></h1>
      <p class="subtitle">Tu viens de scanner mon tatouage, bravo !<br>Tente ta chance et entre dans le classement.</p>
      <div class="stats-row">
        <div class="stat-chip">
          <span class="num" id="players-count">0</span> joueurs
        </div>
        <div class="stat-chip">
          <span class="num" id="best-score">—</span> record
        </div>
      </div>
      <div class="cta-wrapper">
        <button id="btn-play" class="cta">Tirer mon nombre <span class="arrow">→</span></button>
        <div class="cta-pulse"></div>
      </div>
      <button id="btn-leaderboard" class="btn-secondary">Voir le classement</button>
    </div>
  </div>

  <!-- SCREEN: Roll -->
  <div id="screen-roll" class="screen">
    <div class="card">
      <p class="roll-label">Ton nombre est...</p>
      <div id="roll-number" class="roll-number">&mdash;</div>
      <div id="name-form" class="name-form hidden">
        <input type="text" id="name-input" class="input-name" placeholder="Ton pr&eacute;nom" maxlength="30" autocomplete="off" />
        <button id="btn-save" class="cta cta-small">Enregistrer mon score <span class="arrow">→</span></button>
      </div>
      <p id="save-msg" class="save-msg hidden"></p>
      <button id="btn-to-leaderboard" class="btn-secondary hidden">Voir le classement</button>
      <button id="btn-back-home" class="btn-link">← Retour</button>
    </div>
  </div>

  <!-- SCREEN: Leaderboard -->
  <div id="screen-leaderboard" class="screen">
    <div class="card card-wide">
      <h2 class="lb-title">🏆 Classement</h2>
      <p class="lb-subtitle">Tous les scanners de Seb, du plus chanceux au moins chanceux</p>
      <div id="leaderboard-list" class="leaderboard-list">
        <p class="loading-text">Chargement...</p>
      </div>
      <div class="lb-footer">
        <span id="total-players" class="total-players"></span>
        <button id="btn-back" class="btn-secondary">← Retour</button>
      </div>
    </div>
  </div>

  <div class="hint">Scanné depuis un tatouage</div>

  <script type="module" src="js/app.js"></script>
  <script src="js/rain.js"></script>
</body>
</html>
